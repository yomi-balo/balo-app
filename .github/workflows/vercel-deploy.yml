name: Vercel Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: vercel-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TARGET="production"
            REF="${{ github.sha }}"
          else
            TARGET="preview"
            REF="${{ github.event.pull_request.head.sha }}"
          fi

          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.vercel.com/v13/deployments?teamId=team_mCeXh7M3F9tnLibpaJpNZLqM" \
            -d "{
              \"name\": \"balo-web\",
              \"project\": \"prj_d2kJDiyGKMPPwMz89bMJOrgP8p05\",
              \"target\": \"$TARGET\",
              \"gitSource\": {
                \"type\": \"github\",
                \"org\": \"yomi-balo\",
                \"repo\": \"balo-app\",
                \"ref\": \"$REF\"
              }
            }")

          echo "$RESPONSE" | jq .

          URL=$(echo "$RESPONSE" | jq -r '.url // empty')
          ERROR=$(echo "$RESPONSE" | jq -r '.error.message // empty')

          if [ -n "$ERROR" ]; then
            echo "::error::Vercel deployment failed: $ERROR"
            exit 1
          fi

          echo "Deployment triggered: https://$URL"
          echo "deployment-url=https://$URL" >> "$GITHUB_OUTPUT"
