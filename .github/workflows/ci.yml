name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format Check
        run: pnpm format:check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Type Check
        run: pnpm typecheck

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run Tests with Coverage
        run: pnpm test:coverage

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false

      - name: Upload unit lcov artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-unit
          path: coverage/lcov.info
          retention-days: 1

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run Integration Tests with Coverage
        run: pnpm test:integration:coverage

      - name: Show integration lcov SF paths
        if: always()
        run: grep -m3 '^SF:' coverage-integration/lcov.info || true

      - name: Upload integration lcov artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-integration
          path: coverage-integration/lcov.info
          retention-days: 1

  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download unit coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit
          path: coverage

      - name: Download integration coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-integration
          path: coverage-integration

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: balo_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Ephemeral service container — NEVER shared balo-dev (ADR-1026).
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/balo_e2e
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      # >=32 chars (iron-session throws at runtime otherwise); provisioned as a repo secret.
      WORKOS_COOKIE_PASSWORD: ${{ secrets.WORKOS_COOKIE_PASSWORD }}
      # Opens the test-login route in CI; production never sets it (route stays 404).
      E2E_TEST_SECRET: ${{ secrets.E2E_TEST_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Verify seeded-E2E harness env is present
        run: |
          missing=0
          for v in E2E_TEST_SECRET WORKOS_COOKIE_PASSWORD DATABASE_URL; do
            if [ -z "${!v}" ]; then echo "::error::$v is not set — the seeded-E2E harness cannot run"; missing=1; fi
          done
          # WORKOS_COOKIE_PASSWORD must be >=32 chars (iron-session throws at runtime otherwise)
          if [ -n "$WORKOS_COOKIE_PASSWORD" ] && [ "${#WORKOS_COOKIE_PASSWORD}" -lt 32 ]; then
            echo "::error::WORKOS_COOKIE_PASSWORD must be at least 32 characters"; missing=1
          fi
          if [ "$missing" -ne 0 ]; then exit 1; fi
          echo "seeded-E2E harness env present"

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run migrations against ephemeral Postgres
        run: pnpm --filter @balo/db db:migrate

      # NOTE: no job-level `pnpm --filter web build` step — Playwright's webServer
      # (`pnpm build && pnpm start`) is the single build and inherits the job env above.
      - name: Run E2E Tests
        run: pnpm test:e2e --project=chromium
        env:
          CI: true

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build All
        run: pnpm build
        env:
          NEXT_PUBLIC_APP_URL: http://localhost:3000

      - name: Prod-inert smoke — /api/auth/test-login 404s under next start
        run: bash scripts/e2e/test-login-prod-smoke.sh
        # Deliberately NO E2E_TEST_SECRET / WORKOS_COOKIE_PASSWORD / DATABASE_URL:
        # the guard 404s before any session/DB work and the middleware fast-paths the
        # no-cookie public POST, so a bare `next start` returns 404 with no env.
