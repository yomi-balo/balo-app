sonar.organization=yomi-balo
sonar.projectKey=yomi-balo_balo-app

sonar.sources=apps/web/src,apps/api/src,packages/db/src,packages/shared/src
sonar.tests=apps/web/src,apps/api/src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
sonar.exclusions=**/node_modules/**,**/dist/**,**/.next/**,**/drizzle/**,**/coverage/**

sonar.typescript.lcov.reportPaths=apps/web/coverage/lcov.info,apps/api/coverage/lcov.info

sonar.javascript.lcov.reportPaths=apps/web/coverage/lcov.info,apps/api/coverage/lcov.info
