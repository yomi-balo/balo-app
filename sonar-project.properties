sonar.organization=yomi-balo
sonar.projectKey=yomi-balo_balo-app

sonar.sources=apps/web/src,apps/api/src,packages/db/src,packages/shared/src,packages/analytics/src
sonar.tests=apps/web/src,apps/api/src,packages/db/src,packages/shared/src,packages/analytics/src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/test/setup.ts
# rng.ts is a standard deterministic PRNG (mulberry32). Its intentional
# 32-bit `| 0` bit-twiddling is required for correct integer wrap-around; the
# generic "use Math.trunc" rule misjudges it (Math.trunc would break the
# algorithm). Dev-only seeder code, so we exclude it from analysis entirely.
sonar.exclusions=**/node_modules/**,**/dist/**,**/.next/**,**/drizzle/**,**/coverage/**,apps/api/src/services/seed/rng.ts

sonar.cpd.exclusions=packages/db/src/schema/**

# The seed-* orchestrators below are dev-only impure plumbing (DB I/O + the
# resolver call). The pure generators (expert-generator, availability-generator,
# headlines, constants) stay fully covered — only these orchestrators are
# excluded. Also excluded: the dev seed routes (apps/api/src/routes/dev/**) and
# the dev-only web seeding dashboard (apps/web/src/app/dev/**), plus the vendored
# shadcn alert-dialog primitive (apps/web/src/components/ui/alert-dialog.tsx).
sonar.coverage.exclusions=packages/db/src/client.ts,packages/db/src/schema/helpers.ts,packages/db/src/test/**,packages/analytics/src/client/client.ts,apps/api/src/index.ts,apps/api/src/services/seed/seed-service.ts,apps/api/src/services/seed/truncate.ts,apps/api/src/routes/dev/**,apps/web/src/app/dev/**,apps/web/src/components/ui/alert-dialog.tsx

sonar.typescript.lcov.reportPaths=coverage/lcov.info

sonar.javascript.lcov.reportPaths=coverage/lcov.info
